<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Picker - Free Online Color Palette Tool</title>
  <meta name="description" content="Free online color picker. Pick colors, get HEX, RGB, HSL values. Explore color palettes. Perfect for web designers and developers." />
  <script src="/consent.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5276967064769484" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: #999; }
    .back { color: #6c5ce7; text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 30px; margin: 20px 0; }
    .color-preview { width: 100%; height: 180px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #333; transition: background .2s; }
    .picker-row { margin-bottom: 20px; }
    .picker-row input[type="color"] { width: 100%; height: 50px; border: none; border-radius: 8px; cursor: pointer; padding: 0; background: transparent; }
    .values { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .value-box { background: #2a2a2a; border-radius: 8px; padding: 12px; text-align: center; }
    .value-box .label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
    .value-box .value { font-family: 'Courier New', monospace; font-size: 0.95rem; color: #fff; cursor: pointer; }
    .value-box .value:hover { color: #6c5ce7; }
    .palette { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .palette-item { width: 44px; height: 44px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color .2s; }
    .palette-item:hover { border-color: #6c5ce7; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #00b894; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 0.9rem; display: none; z-index: 9999; }
    footer { text-align: center; padding: 30px; color: #555; font-size: 0.85rem; }
    footer a { color: #555; }
    @media (max-width: 600px) { .values { grid-template-columns: 1fr; } header h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
<div class="container">
  <a href="../" class="back">← All Tools</a>
  <header>
    <h1>🎨 Color Picker</h1>
    <p>Pick, explore, and copy colors</p>
  </header>
  <div class="card">
    <div class="color-preview" id="colorPreview" style="background:#6c5ce7"></div>
    <div class="picker-row">
      <input type="color" id="colorPicker" value="#6c5ce7" />
    </div>
    <div class="values">
      <div class="value-box"><div class="label">HEX</div><div class="value copy-value" data-value="#6c5ce7">#6c5ce7</div></div>
      <div class="value-box"><div class="label">RGB</div><div class="value copy-value" data-value="rgb(108,92,231)">rgb(108,92,231)</div></div>
      <div class="value-box"><div class="label">HSL</div><div class="value copy-value" data-value="hsl(247,74%,63%)">hsl(247,74%,63%)</div></div>
    </div>
    <div style="margin-top:20px;"><h3 style="color:#aaa;font-size:0.9rem;margin-bottom:10px;">🎯 Saved Colors</h3>
    <div class="palette" id="palette"></div></div>
  </div>
  <footer><p><a href="../privacy.html">Privacy Policy</a> — Free Online Tools</p></footer>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
(function() {
  const picker = document.getElementById('colorPicker');
  const preview = document.getElementById('colorPreview');
  const hexVal = document.querySelector('.values .value[data-value^="#"]');
  const rgbVal = document.querySelectorAll('.value.copy-value')[1];
  const hslVal = document.querySelectorAll('.value.copy-value')[2];
  const palette = document.getElementById('palette');
  const toast = document.getElementById('toast');

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        case b: h = ((r - g) / d + 4) / 6; break;
      }
    }
    return `hsl(${Math.round(h * 360)},${Math.round(s * 100)}%,${Math.round(l * 100)}%)`;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
  }

  function updateColor(hex) {
    preview.style.background = hex;
    const { r, g, b } = hexToRgb(hex);
    const rgb = `rgb(${r},${g},${b})`;
    const hsl = rgbToHsl(r, g, b);
    hexVal.textContent = hex; hexVal.dataset.value = hex;
    rgbVal.textContent = rgb; rgbVal.dataset.value = rgb;
    hslVal.textContent = hsl; hslVal.dataset.value = hsl;
  }

  picker.addEventListener('input', () => updateColor(picker.value));

  // Copy on click
  document.querySelectorAll('.copy-value').forEach(el => {
    el.addEventListener('click', () => {
      const val = el.dataset.value;
      navigator.clipboard.writeText(val).then(() => { showToast('Copied: ' + val); });
    });
  });

  function showToast(msg) {
    toast.textContent = msg; toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 1500);
  }

  // Save color to palette
  const paletteKey = 'color_palette';
  function loadPalette() {
    try {
      const saved = JSON.parse(localStorage.getItem(paletteKey) || '[]');
      saved.forEach(addPaletteItem);
    } catch(e) {}
  }
  function addPaletteItem(hex) {
    const div = document.createElement('div');
    div.className = 'palette-item';
    div.style.background = hex;
    div.title = hex;
    div.addEventListener('click', () => { picker.value = hex; updateColor(hex); });
    palette.appendChild(div);
  }
  function saveToPalette() {
    const hex = picker.value;
    try {
      const saved = JSON.parse(localStorage.getItem(paletteKey) || '[]');
      if (!saved.includes(hex)) {
        saved.push(hex);
        localStorage.setItem(paletteKey, JSON.stringify(saved));
        addPaletteItem(hex);
      }
      showToast('Saved: ' + hex);
    } catch(e) {}
  }
  // Right-click or long-press to save
  preview.addEventListener('dblclick', saveToPalette);

  loadPalette();
  updateColor(picker.value);
})();
</script>
</body>
</html>
