<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timestamp Converter - Free Unix Time & Date Converter</title>
  <meta name="description" content="Free online timestamp converter. Convert Unix timestamps to readable dates and dates to Unix timestamps. Supports multiple timezones." />
  <script src="/consent.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5276967064769484" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: #999; }
    .back { color: #6c5ce7; text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 30px; margin: 20px 0; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; }
    input, select { width: 100%; padding: 12px 16px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 1rem; }
    input:focus, select:focus { outline: none; border-color: #6c5ce7; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: 600; transition: background .2s; margin-top: 12px; }
    .btn-primary { background: #6c5ce7; }
    .btn-primary:hover { background: #5a4bd1; }
    .result-box { background: #2a2a2a; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .result-box .label { color: #888; font-size: 0.8rem; margin-bottom: 4px; }
    .result-box .value { font-family: 'Courier New', monospace; font-size: 1.1rem; color: #6c5ce7; word-break: break-all; }
    .now-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    .now-row .timestamp { font-family: 'Courier New', monospace; font-size: 0.9rem; color: #aaa; }
    .now-row .refresh { background: #333; border: none; color: #aaa; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    .now-row .refresh:hover { background: #444; color: #fff; }
    footer { text-align: center; padding: 30px; color: #555; font-size: 0.85rem; }
    footer a { color: #555; }
    @media (max-width: 600px) { header h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
<div class="container">
  <a href="../" class="back">← All Tools</a>
  <header>
    <h1>⏰ Timestamp Converter</h1>
    <p>Convert between Unix timestamps and human-readable dates</p>
  </header>
  <div class="card">
    <div class="now-row">
      <span style="color:#aaa;font-size:0.9rem;">🕐 Current Unix Time:</span>
      <span class="timestamp" id="nowTimestamp">--</span>
      <button class="refresh" id="refreshNow">Refresh</button>
    </div>
    <hr style="border-color:#333;margin:20px 0;" />
    <h3 style="color:#aaa;font-size:0.95rem;margin-bottom:16px;">Unix Timestamp → Date</h3>
    <div class="input-group">
      <label>Enter Unix Timestamp (seconds)</label>
      <input type="number" id="tsInput" placeholder="e.g. 1778662800" value="1778662800" />
    </div>
    <button class="btn btn-primary" id="tsToDate">Convert to Date →</button>
    <div class="result-box" id="tsResult" style="display:none;">
      <div class="label">UTC</div>
      <div class="value" id="tsUtc"></div>
      <div class="label" style="margin-top:10px;">Local</div>
      <div class="value" id="tsLocal"></div>
    </div>
    <hr style="border-color:#333;margin:20px 0;" />
    <h3 style="color:#aaa;font-size:0.95rem;margin-bottom:16px;">Date → Unix Timestamp</h3>
    <div class="input-group">
      <label>Select Date & Time</label>
      <input type="datetime-local" id="dateInput" />
    </div>
    <button class="btn btn-primary" id="dateToTs">Convert to Timestamp →</button>
    <div class="result-box" id="dateResult" style="display:none;">
      <div class="label">Unix Timestamp (seconds)</div>
      <div class="value" id="dateTs"></div>
      <div class="label" style="margin-top:10px;">Unix Timestamp (milliseconds)</div>
      <div class="value" id="dateTsMs"></div>
    </div>
  </div>
  <footer><p><a href="../privacy.html">Privacy Policy</a> — Free Online Tools</p></footer>
</div>
<script>
(function() {
  const nowTs = document.getElementById('nowTimestamp');
  const refreshNow = document.getElementById('refreshNow');
  const tsInput = document.getElementById('tsInput');
  const tsToDate = document.getElementById('tsToDate');
  const tsResult = document.getElementById('tsResult');
  const tsUtc = document.getElementById('tsUtc');
  const tsLocal = document.getElementById('tsLocal');
  const dateInput = document.getElementById('dateInput');
  const dateToTs = document.getElementById('dateToTs');
  const dateResult = document.getElementById('dateResult');
  const dateTs = document.getElementById('dateTs');
  const dateTsMs = document.getElementById('dateTsMs');

  function updateNow() { nowTs.textContent = Math.floor(Date.now() / 1000); }
  updateNow();
  setInterval(updateNow, 1000);
  refreshNow.addEventListener('click', updateNow);

  // Set default date to now
  {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const h = String(now.getHours()).padStart(2,'0');
    const mi = String(now.getMinutes()).padStart(2,'0');
    dateInput.value = `${y}-${m}-${d}T${h}:${mi}`;
  }

  tsToDate.addEventListener('click', () => {
    const val = parseInt(tsInput.value);
    if (isNaN(val)) { tsResult.style.display = 'none'; return; }
    const d = new Date(val * 1000);
    tsUtc.textContent = d.toUTCString();
    tsLocal.textContent = d.toLocaleString();
    tsResult.style.display = 'block';
  });

  dateToTs.addEventListener('click', () => {
    const val = dateInput.value;
    if (!val) { dateResult.style.display = 'none'; return; }
    const ms = new Date(val).getTime();
    dateTs.textContent = Math.floor(ms / 1000);
    dateTsMs.textContent = ms;
    dateResult.style.display = 'block';
  });

  // Auto-convert on enter
  tsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tsToDate.click(); });
  dateInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') dateToTs.click(); });

  // Initial conversion
  tsToDate.click();
})();
</script>
</body>
</html>
