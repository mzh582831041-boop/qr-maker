<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator - Free Online QR Maker</title>
  <meta name="description" content="Free online QR code generator. Create custom QR codes with colors in seconds. No signup required." />
  <meta name="google-adsense-account" content="ca-pub-5276967064769484">
  <script src="/consent.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5276967064769484" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: #999; }
    .back { color: #6c5ce7; text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; }

    .card {
      background: #1a1a1a; border-radius: 16px; padding: 30px; margin: 20px 0;
    }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; }
    input, select {
      width: 100%; padding: 12px 16px; background: #2a2a2a; border: 1px solid #444;
      border-radius: 8px; color: #fff; font-size: 1rem;
    }
    input:focus, select:focus { outline: none; border-color: #6c5ce7; }

    .color-row { display: flex; gap: 15px; margin-bottom: 20px; }
    .color-row > div { flex: 1; }
    .color-row input[type="color"] { height: 44px; padding: 4px; cursor: pointer; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 8px;
      color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: 600;
      transition: background .2s;
    }
    .btn-primary { background: #6c5ce7; }
    .btn-primary:hover { background: #5a4bd1; }
    .btn-success { background: #00b894; margin-top: 15px; }
    .btn-success:hover { background: #00a381; }

    .qr-output { text-align: center; margin-top: 20px; display: none; }
    .qr-output.active { display: block; }
    .qr-output img { max-width: 280px; border-radius: 8px; }

    footer { text-align: center; padding: 30px; color: #555; font-size: 0.85rem; }
    footer a { color: #555; }
  </style>
</head>
<body>
<div class="container">
  <a href="../" class="back">← All Tools</a>
  <header>
    <h1>🔳 QR Code Generator</h1>
    <p>Create custom QR codes with your own colors</p>
  </header>

  <div class="card">
    <div class="input-group">
      <label>URL or Text</label>
      <input type="url" id="textInput" placeholder="https://example.com or any text..." />
    </div>
    <div class="color-row">
      <div class="input-group">
        <label>QR Color</label>
        <input type="color" id="fgColor" value="#000000" />
      </div>
      <div class="input-group">
        <label>Background</label>
        <input type="color" id="bgColor" value="#ffffff" />
      </div>
    </div>
    <div class="input-group">
      <label>Size</label>
      <select id="sizeSelect">
        <option value="200">Small (200x200)</option>
        <option value="300" selected>Medium (300x300)</option>
        <option value="400">Large (400x400)</option>
        <option value="500">XL (500x500)</option>
      </select>
    </div>
    <button class="btn btn-primary" id="generateBtn">✨ Generate QR Code</button>
    <div class="qr-output" id="qrOutput">
      <div id="qrContainer"></div>
      <button class="btn btn-success" id="downloadBtn">⬇ Download PNG</button>
    </div>
  </div>

  <footer><p><a href="../privacy.html">Privacy Policy</a> — Free Online Tools</p></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
const textInput = document.getElementById('textInput');
const fgColor = document.getElementById('fgColor');
const bgColor = document.getElementById('bgColor');
const sizeSelect = document.getElementById('sizeSelect');
const generateBtn = document.getElementById('generateBtn');
const qrOutput = document.getElementById('qrOutput');
const qrContainer = document.getElementById('qrContainer');
const downloadBtn = document.getElementById('downloadBtn');
let currentQR = null;

generateBtn.addEventListener('click', generateQR);
textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateQR(); });

function generateQR() {
  const text = textInput.value.trim();
  if (!text) { textInput.focus(); return; }
  const size = parseInt(sizeSelect.value);
  qrContainer.innerHTML = '';
  currentQR = new QRCode(qrContainer, {
    text, width: size, height: size,
    colorDark: fgColor.value, colorLight: bgColor.value,
    correctLevel: QRCode.CorrectLevel.H
  });
  qrOutput.classList.add('active');
}

downloadBtn.addEventListener('click', () => {
  const img = qrContainer.querySelector('img');
  if (!img) return;
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor.value; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png'); a.download = 'qrcode.png'; a.click();
});

setTimeout(() => { textInput.value = 'https://example.com'; generateQR(); }, 500);
</script>
</body>
</html>
