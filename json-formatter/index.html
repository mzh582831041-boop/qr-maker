<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Formatter - Free Online JSON Validator & Beautifier</title>
  <meta name="description" content="Free online JSON formatter and validator. Format, beautify, and validate JSON instantly. No signup required." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 20px 20px; }
    header h1 { font-size: 2rem; margin-bottom: 10px; }
    header p { color: #999; }
    .back { color: #6c5ce7; text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; }

    .btn-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; transition: background .2s;
    }
    .btn-primary { background: #6c5ce7; color: #fff; }
    .btn-primary:hover { background: #5a4bd1; }
    .btn-success { background: #00b894; color: #fff; }
    .btn-success:hover { background: #00a381; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #444; color: #fff; }
    .btn-secondary:hover { background: #555; }

    textarea {
      width: 100%; height: 250px; padding: 20px;
      background: #1a1a1a; border: 1px solid #444; border-radius: 12px;
      color: #fff; font-size: 0.9rem; line-height: 1.5; resize: vertical;
      font-family: 'Courier New', monospace;
    }
    textarea:focus { outline: none; border-color: #6c5ce7; }

    .status { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; font-size: 0.9rem; }
    .status.success { display: block; background: #004d40; color: #00b894; }
    .status.error { display: block; background: #4a0e0e; color: #e74c3c; }

    .ad-banner { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0; color: #555; font-size: 0.85rem; }
    footer { text-align: center; padding: 30px; color: #555; font-size: 0.85rem; }
    footer a { color: #555; }
  </style>
</head>
<body>
<div class="container">
  <a href="../" class="back">← All Tools</a>
  <header>
    <h1>📋 JSON Formatter</h1>
    <p>Format, validate, and beautify your JSON</p>
  </header>

  <div class="ad-banner">[ Ad Space — Google AdSense will go here ]</div>

  <div class="btn-row">
    <button class="btn btn-primary" id="formatBtn">✨ Format</button>
    <button class="btn btn-success" id="minifyBtn">🗜️ Minify</button>
    <button class="btn btn-secondary" id="copyBtn">📋 Copy</button>
    <button class="btn btn-danger" id="clearBtn">🗑 Clear</button>
  </div>

  <textarea id="jsonInput" placeholder='Paste your JSON here...
Example: {"name":"John","age":30}'></textarea>

  <div class="status" id="status"></div>

  <footer><p><a href="../privacy.html">Privacy Policy</a> — Free Online Tools</p></footer>
</div>

<script>
const input = document.getElementById('jsonInput');
const status = document.getElementById('status');
const formatBtn = document.getElementById('formatBtn');
const minifyBtn = document.getElementById('minifyBtn');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');

function formatJSON() {
  try {
    const parsed = JSON.parse(input.value);
    input.value = JSON.stringify(parsed, null, 2);
    status.className = 'status success';
    status.textContent = '✅ Valid JSON! Formatted successfully.';
  } catch (e) {
    status.className = 'status error';
    status.textContent = `❌ Invalid JSON: ${e.message}`;
  }
}

function minifyJSON() {
  try {
    const parsed = JSON.parse(input.value);
    input.value = JSON.stringify(parsed);
    status.className = 'status success';
    status.textContent = '✅ Minified successfully.';
  } catch (e) {
    status.className = 'status error';
    status.textContent = `❌ Invalid JSON: ${e.message}`;
  }
}

formatBtn.addEventListener('click', formatJSON);
minifyBtn.addEventListener('click', minifyJSON);
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(input.value).then(() => {
    status.className = 'status success';
    status.textContent = '✅ Copied to clipboard!';
  });
});
clearBtn.addEventListener('click', () => { input.value = ''; status.className = 'status'; status.style.display = 'none'; });
</script>
</body>
</html>
